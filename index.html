// FASE 6 — O DIA A DIA (Livros + Boss Bella)
// ═══════════════════════════════════════════════════════════════
function createDailyLife(skipIntro=false) {
  SFX.setMusicTheme('daily');
  let phase='dialog', t=0, frame=0;

  // ── Puzzle dos livros ──
  // índices: 0=Mulheres, 1=Factotum, 2=Misto Quente, 3=Pulp, 4=50 Tons (falso), 5=Crepúsculo (falso)
  const ALL_TITLES=['Mulheres','Factotum','Misto\nQuente','Pulp','50 Tons\nde Cinza','Crepús-\nculo'];
  const ALL_COLORS=['#cc3344','#3355cc','#33aa55','#9933cc','#888800','#336688'];
  const IS_BUKO=[true,true,true,true,false,false];
  // ordem exibida na prateleira: Crepúsculo, Misto Quente, Mulheres, 50 Tons, Pulp, Factotum
  const bookDisp=[5,2,0,4,3,1];
  // ordem correta dos índices reais: Mulheres(0), Factotum(1), Pulp(3), Misto Quente(2)
  const CORRECT_SEQ=[0,1,3,2];
  let bSel=0, picks=[], wrongFlash=false, wrongT=0, booksDone=false, wrongShake=0;

  // ── Boss Bella ──
  let px2=W/2, bellaX=-30, bellaSpeed=2.4, bellaDir=1;
  let bellaState='run', bellaT=0, blocks=0, bLives=3, bossWon=false;
  let warningBlink=0;
  const breadX=W/2;
  const breadHitRange=34;
  const BELLA_BLOCKS_TO_WIN=10;
  const BELLA_MAX_SPEED=8.0;
  const BELLA_BLOCK_SPEED_GAIN=0.65;

  function spawnBella(){
    if(Math.random()<0.5){
      bellaDir = -1;
      bellaX = W+30;
    } else {
      bellaDir = 1;
      bellaX = -30;
    }
    bellaState='run';
  }

  if(skipIntro) {
    phase='books';
  } else {
    showDialog([
      '"E agora... a fase mais difícil de todas."',
      'O Dia a Dia.',
      'Prova 1: ache os livros do Bukowski e ordene-os por ordem de preferência dela.',
      'Cuidado: tem livro falso na prateleira!  ← → ↑ ↓ ESPAÇO',
    ], ()=>{ phase='books'; });
  }

  return {
    update(){
      t++;
      if(phase==='dialog'||phase==='outro'){ updateDialog(); return; }

      if(phase==='books'){
        if(booksDone){ updateDialog(); return; }
        if(wrongT>0){ wrongT--; if(!wrongT) wrongFlash=false; }
        if(wrongShake>0) wrongShake--;
        if(justPressed['ArrowLeft']||justPressed['KeyA'])  bSel=Math.max(0,bSel-1);
        if(justPressed['ArrowRight']||justPressed['KeyD']) bSel=Math.min(5,bSel+1);
        if(justPressed['ArrowUp']||justPressed['KeyW'])    bSel=bSel>=3?bSel-3:bSel;
        if(justPressed['ArrowDown']||justPressed['KeyS'])  bSel=bSel<3?bSel+3:bSel;
      }

      if(phase==='boss'){
        frame+=.12;
        if(keys['ArrowLeft']||keys['KeyA'])  px2=Math.max(12,px2-3.5);
        if(keys['ArrowRight']||keys['KeyD']) px2=Math.min(W-12,px2+3.5);
        warningBlink++;

        if(bellaState==='run'&&!bossWon){
          const prevX=bellaX;
          bellaX += bellaSpeed * bellaDir;
          // block: Chef na frente de Bella (colisão + anti-tunneling)
          const dist=Math.abs(px2-bellaX);
          const tunneled=bellaDir===1?(prevX<px2&&px2<=bellaX):(bellaX<=px2&&px2<prevX);
          const nearBellaPath=Math.abs(px2-bellaX)<24||Math.abs(px2-prevX)<24;
          if(dist<20||(tunneled&&nearBellaPath)){
            SFX.block();
            bellaState='blocked'; bellaT=0; blocks++;
            bellaSpeed=Math.min(BELLA_MAX_SPEED,bellaSpeed+BELLA_BLOCK_SPEED_GAIN);
            for(let i=0;i<3;i++) spawnHeart(bellaX,H-85);
            if(blocks>=BELLA_BLOCKS_TO_WIN){ SFX.success(); bossWon=true; bellaT=0; }
          }
          // Bella chega ao pão central
          if(bellaState==='run'&&((bellaDir===1&&bellaX>breadX-breadHitRange)||(bellaDir===-1&&bellaX<breadX+breadHitRange))){
            SFX.hit();
            bLives--; bellaSpeed=Math.min(BELLA_MAX_SPEED,bellaSpeed+0.3);
            if(bLives<=0){ bLives=3; blocks=Math.max(0,blocks-1); }
            spawnBella();
          }
        }
        if(bellaState==='blocked'){
          bellaT++; bellaX -= bellaDir*1.8; // recua na direção oposta
          if(bellaT>50){ spawnBella(); }
        }
        if(bossWon){ bellaT++;
          if(bellaT===80){
            showDialog([
              '"Bella tentou. Bella falhou."',
              '"Mas o pão sobreviveu — dessa vez."',
              'Você passou pela fase mais difícil, Chef. ♥',
              'Fase 6 concluída! Agora sim... o final.',
            ], ()=>fadeToScene(createFinal));
            phase='outro';
          }
        }
      }
      updateFHearts();
    },

    draw(){
      px(0,0,W,H,'#f0e6d0');
      px(0,H-48,W,48,'#c4a870');
      px(0,H-52,W,5,'#a08050');
      px(0,H-52,W,3,'#d4b880');

      if(phase==='books'){
        const sx=wrongShake>0?Math.round(Math.sin(wrongShake*1.5)*5):0;
        // quadro na parede acima da estante
        px(120+sx,6,220,30,'#c8a870'); px(124+sx,8,212,26,'#4a6080');
        ctx.fillStyle='#8ab0d0'; ctx.font='bold 9px "Courier New"'; ctx.textAlign='center';
        ctx.fillText('Estante de Livros',230+sx,26); ctx.textAlign='left';
        // estante (3 prateleiras para 6 livros)
        px(16+sx,40,W-32,178,'#7a4e2a');
        px(16+sx,40,W-32,10,'#5a3010');
        px(16+sx,215,W-32,8,'#5a3010');
        px(16+sx,120,W-32,7,'#5a3010'); // prateleira do meio
        for(let g=0;g<4;g++){ ctx.fillStyle='rgba(0,0,0,.06)'; ctx.fillRect(16+sx+g*110,42,3,176); }
        // 6 livros em duas fileiras (3+3)
        for(let i=0;i<6;i++){
          const row=Math.floor(i/3), col=i%3;
          const bi=bookDisp[i];
          const bx=30+sx+col*148, by=48+row*74;
          const bw=60, bh=IS_BUKO[bi]?60:50;
          const byAdj=by+(60-bh);
          const isPicked=picks.includes(i);
          const isSel=bSel===i&&!booksDone;
          const pOrder=picks.indexOf(i);
          // livro falso tem aparência gasta / desbotada
          ctx.fillStyle=isPicked?'#555':ALL_COLORS[bi];
          ctx.globalAlpha=IS_BUKO[bi]?1.0:0.65;
          ctx.fillRect(bx,byAdj,bw,bh);
          ctx.globalAlpha=1.0;
          ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fillRect(bx,byAdj,8,bh); // lombada
          ctx.fillStyle='rgba(0,0,0,.18)';     ctx.fillRect(bx+bw-8,byAdj,8,bh);
          // folhas brancas (miolo do livro)
          ctx.fillStyle='#f5f0e8'; ctx.fillRect(bx+bw-6,byAdj+2,5,bh-4);
          ctx.fillStyle='rgba(0,0,0,.08)';
          for(let pg=0;pg<5;pg++) ctx.fillRect(bx+bw-6,byAdj+2+pg*((bh-4)/5),5,1);
          ctx.save(); ctx.fillStyle=isPicked?'#888':C.white;
          ctx.font=`bold ${IS_BUKO[bi]?8:7}px "Courier New"`; ctx.textAlign='center';
          ALL_TITLES[bi].split('\n').forEach((p,pi)=>ctx.fillText(p,bx+bw/2,byAdj+13+pi*11));
          ctx.restore();
          if(isSel){
            ctx.strokeStyle=C.gold; ctx.lineWidth=2; ctx.strokeRect(bx-2,byAdj-2,bw+4,bh+4);
            if(Math.floor(t/14)%2===0){ ctx.fillStyle=C.gold; ctx.font='10px monospace'; ctx.textAlign='center'; ctx.fillText('▲',bx+bw/2,byAdj-7); ctx.textAlign='left'; }
          }
          if(wrongFlash&&!picks.includes(i)){ ctx.fillStyle='rgba(255,0,0,.4)'; ctx.fillRect(bx,byAdj,bw,bh); }
          if(pOrder!==-1){
            ctx.fillStyle=C.gold; ctx.font='bold 11px "Courier New"'; ctx.textAlign='center';
            ctx.fillText(pOrder+1+'.',bx+bw/2,byAdj+bh+14); ctx.textAlign='left';
          }
        }
        // rodapé: fundo escuro para legibilidade
        px(0,H-48,W,48,'rgba(0,0,0,.0)'); // já existe o chão
        ctx.fillStyle='#3a2010'; ctx.font='bold 9px "Courier New"'; ctx.textAlign='center';
        ctx.fillText('Qual a ordem dos favoritos do Bukowski dela?',W/2,H-34);
        drawBottomHint(`Confirmados ${picks.length}/4  ·  ← → ↑ ↓ navegar  ·  ESPAÇO confirmar`, '#cc8800');
        ctx.textAlign='left';
        drawChef(22,H-75,1,t/30);
      }

      if(phase==='boss'){
        // sofá (esquerda)
        px(8,H-92,110,46,'#7744aa'); px(8,H-104,110,16,'#9966cc');
        px(8,H-104,18,16,'#aa77dd'); px(100,H-104,18,16,'#aa77dd');
        // mesa + pão central
        px(breadX-42,H-88,84,10,'#8b5e3c');
        px(breadX-42,H-98,84,14,'#c8a050');
        px(breadX-20,H-112,40,16,'#d4a840');
        px(breadX-16,H-120,32,10,'#e8c060');
        px(breadX-13,H-123,26,6,'#f0d070');
        ctx.fillStyle='#7a5010'; ctx.font='bold 8px "Courier New"'; ctx.textAlign='center';
        ctx.fillText('PAO',breadX,H-99); ctx.textAlign='left';
        if(Math.floor(warningBlink/18)%2===0){
          ctx.fillStyle=C.red; ctx.font='bold 9px "Courier New"'; ctx.textAlign='center';
          ctx.fillText('NAO DEIXA A BELLA COMER O PAO!!',W/2,H-128); ctx.textAlign='left';
        }
        // Bella (espelhada se vem da direita)
        if(bellaDir===-1){
          ctx.save(); ctx.translate(bellaX*2,0); ctx.scale(-1,1);
          drawBella(bellaX,H-75,t);
          ctx.restore();
        } else {
          drawBella(bellaX,H-75,t);
        }
        drawChef(px2,H-75,bellaDir===1?-1:1,frame);
        if(bellaState==='blocked'){
          const bubbleW=80, bubbleH=22;
          const bubbleX=Math.max(8,Math.min(W-bubbleW-8,bellaX-36));
          const bubbleY=H-116;
          ctx.fillStyle='rgba(255,255,255,.94)'; ctx.fillRect(bubbleX,bubbleY,bubbleW,bubbleH);
          ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(bubbleX,bubbleY,bubbleW,bubbleH);
          ctx.fillStyle='rgba(255,255,255,.94)';
          ctx.beginPath(); ctx.moveTo(bubbleX+42,bubbleY+bubbleH); ctx.lineTo(bubbleX+50,bubbleY+bubbleH); ctx.lineTo(Math.max(10,Math.min(W-10,bellaX+4)),H-84); ctx.closePath(); ctx.fill();
          ctx.strokeStyle='#333'; ctx.beginPath(); ctx.moveTo(bubbleX+42,bubbleY+bubbleH); ctx.lineTo(Math.max(10,Math.min(W-10,bellaX+4)),H-84); ctx.lineTo(bubbleX+50,bubbleY+bubbleH); ctx.stroke();
          ctx.fillStyle=C.black; ctx.font='9px "Courier New"'; ctx.textAlign='center';
          ctx.fillText('Au! quase peguei!',bubbleX+bubbleW/2,bubbleY+14); ctx.textAlign='left';
        }
        drawHUD('Boss Bella', `Bloqueios ${blocks}/${BELLA_BLOCKS_TO_WIN}  Pao ${'[ok]'.repeat(bLives)+'[x]'.repeat(3-bLives)}  Vel ${bellaSpeed.toFixed(1)}`, {w:310, color:'#cc8800'});
        drawBottomHint('NAO DEIXA A BELLA COMER O PAO!!', '#cc8800');
        if(bossWon){
          ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(0,0,W,H);
          ctx.fillStyle=C.gold; ctx.textAlign='center'; ctx.font='bold 15px "Courier New"';
          ctx.fillText('* Bella bloqueada! *',W/2,H/2-8);
          ctx.fillStyle=C.white; ctx.font='11px "Courier New"';
          ctx.fillText('A comida esta salva!',W/2,H/2+14); ctx.textAlign='left';
        }
      }
      drawFHearts(); drawDialog();
    },

    onKey(code){
      if(phase==='books'&&!booksDone){
        if(code==='Space'||code==='Enter'){
          if(picks.includes(bSel)){ SFX.error(); wrongFlash=true; wrongT=28; wrongShake=20; return; }
          const bi=bookDisp[bSel];
          if(!IS_BUKO[bi]){ SFX.error(); wrongFlash=true; wrongT=36; wrongShake=28; picks=[]; return; }
          if(bi===CORRECT_SEQ[picks.length]){
            SFX.collect();
            picks.push(bSel);
            if(picks.length===4){
              SFX.success();
              booksDone=true;
              showDialog([
                '"Mulheres. Factotum. Pulp. Misto Quente."',
                '"Você a conhece de verdade."',
                'Prova 1 superada! Agora... o Boss Final.',
                'Bella vem dos dois lados. Bloqueie 10 vezes!',
              ], ()=>{ SFX.setMusicTheme('boss'); phase='boss'; spawnBella(); });
            }
          } else { SFX.error(); wrongFlash=true; wrongT=36; wrongShake=28; picks=[]; }
        }
      }
    }
  };
}

// FINAL SCENE
// ═══════════════════════════════════════════════════════════════
function createFinal(skipIntro=false) {
  SFX.setMusicTheme('final');
  let t=0, phase='dialog', msgAlpha=0;
  if(skipIntro) {
    phase='message'; msgAlpha=1;
  } else {
    showDialog([
      'Chef atravessou todos os lugares.',
      'A academia onde tudo começou...',
      'O morro onde o coração escolheu...',
      'O cinema, a praia, a sorveteria...',
      'E agora chegou onde sempre quis chegar.',
      'Aqui. Com ela. ♥',
    ], ()=>{ phase='message'; });
  }

  const MSG=[
    'Feliz Dia dos Namorados, Chef.',
    '',
    'Cada lugar que passamos juntos',
    'virou parte de quem somos.',
    '',
    'Você é minha aventura favorita.',
    '',
    '— Mrs. Puff  ♥',
  ];

  return {
    update(){
      t++; if(t%18===0) spawnHeart();
      if(phase==='dialog') updateDialog();
      if(phase==='message') msgAlpha=Math.min(1,msgAlpha+.018);
      updateFHearts();
    },
    draw(){
      // night sky
      px(0,0,W,H,'#0a0318');
      for(let i=0;i<90;i++){
        const sx=(i*73+31)%W, sy=(i*97+17)%(H-55);
        ctx.fillStyle=`rgba(255,255,255,${.2+.4*Math.sin(t*.04+i)})`; ctx.fillRect(sx,sy,1+(i%5===0?1:0),1+(i%5===0?1:0));
      }
      // moon
      ctx.fillStyle='#ffffc8'; ctx.beginPath(); ctx.arc(58,48,22,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#0a0318'; ctx.beginPath(); ctx.arc(68,42,18,0,Math.PI*2); ctx.fill();
      // ground & flowers
      px(0,H-44,W,44,C.grn3); px(0,H-49,W,6,C.grn2);
      for(let fx=18;fx<W;fx+=22){
        const fh=8+(fx*7%12);
        px(fx,H-49-fh,2,fh,C.grn2);
        ctx.fillStyle=fx%44===18?C.pink:C.pink2;
        ctx.beginPath(); ctx.arc(fx+1,H-49-fh,3.5,0,Math.PI*2); ctx.fill();
      }
      drawFHearts();
      // characters together
      if(phase!=='dialog'){
        const cx=W/2;
        drawChef(cx-35,H-88,1,t/30);
        drawMrsPuff(cx+12,H-86,t/30);
        const pulse=1+.08*Math.sin(t*.09);
        ctx.save(); ctx.translate(cx-10,H-114); ctx.scale(pulse,pulse); drawHeart(-10,-10,22); ctx.restore();
      }
      // message card
      if(msgAlpha>0){
        ctx.save(); ctx.globalAlpha=msgAlpha;
        ctx.fillStyle='rgba(8,4,24,.92)'; ctx.fillRect(18,12,W-36,158);
        ctx.strokeStyle=C.pink; ctx.lineWidth=2; ctx.strokeRect(18,12,W-36,158);
        drawHeart(22,15,10); drawHeart(W-34,15,10);
        ctx.textAlign='center';
        for(let i=0;i<MSG.length;i++){
          if(!MSG[i]) continue;
          const isTitle=i===0, isSig=i===MSG.length-1;
          ctx.fillStyle=isTitle?C.gold:isSig?C.pink2:C.white;
          ctx.font=`${isTitle?'bold 13':isSig?'italic 11':'11'}px "Courier New"`;
          ctx.fillText(MSG[i],W/2,32+i*17);
        }
        ctx.restore();
        ctx.textAlign='left';
      }
      drawDialog();
    },
    onKey(){}
  };
}

// ─── LOOP ────────────────────────────────────────────────────
function onKey(e) { if(e._debugHandled) return; if(scene&&scene.onKey) scene.onKey(e.code); }
document.addEventListener('keydown', onKey);

function resetTransientState() {
  dialog = null;
  fhearts.length = 0;
  fadeAlpha = 0;
  fadingIn = false;
  fadingOut = false;
  fadeCB = null;
  clearJP();
}

function jumpToDebugScene(fn) {
  resetTransientState();
  scene = fn();
}

function handleDebugHotkey(e) {
  if (!e.ctrlKey) return false;
  if (/^(Digit|Numpad)[1-6]$/.test(e.code)) {
    const idx = Number(e.code.replace('Digit','').replace('Numpad','')) - 1;
    jumpToDebugScene(() => createGame(idx, true));
    e._debugHandled = true;
    e.preventDefault();
    return true;
  }
  if (e.code === 'KeyF') {
    jumpToDebugScene(() => createFinal(true));
    e._debugHandled = true;
    e.preventDefault();
    return true;
  }
  return false;
}

function createInitialScene() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('scene') === 'title') return createTitle();
  if (params.get('final') === '1') return createFinal(true);
  const fase = Number(params.get('fase'));
  if (Number.isInteger(fase) && fase >= 1 && fase <= 6) return createGame(fase - 1, true);
  return createTitle();
}

function loop() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W*SCALE,H*SCALE);
  ctx.setTransform(SCALE,0,0,SCALE,0,0);
  if(scene){ scene.update(); scene.draw(); }
  updateFade(); drawFade();
  clearJP();
  requestAnimationFrame(loop);
}

scene = createInitialScene();
loop();
</script>
